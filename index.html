<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Mahmud</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at top, #0f2027, #203a43, #000);
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: white;
}

/* Moon */
.moon {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 120px;
    background: #fff;
    border-radius: 50%;
    box-shadow: -25px 0 0 10px #0f2027;
    animation: glow 3s infinite alternate;
}

/* Stars */
.star {
    position: absolute;
    width: 3px;
    height: 3px;
    background: white;
    border-radius: 50%;
    animation: blink 2s infinite;
}

@keyframes blink {
    50% { opacity: 0.2; }
}

/* Text */
h1 {
    margin-top: 200px;
    font-size: 45px;
    color: gold;
    animation: glowText 2s infinite alternate;
}

@keyframes glowText {
    from { text-shadow: 0 0 10px gold; }
    to { text-shadow: 0 0 30px orange; }
}

/* Name */
.name {
    font-size: 32px;
    color: #00ffcc;
    margin-top: 10px;
}

/* Photo */
img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 4px solid gold;
    margin-top: 20px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

/* Lantern */
.lantern {
    position: absolute;
    top: -100px;
    width: 40px;
    animation: fall 6s linear infinite;
}

@keyframes fall {
    to { transform: translateY(120vh); }
}
</style>
</head>

<body>

<div class="moon"></div>

<h1>🌙 Eid Mubarak 🌙</h1>
<div class="name">Mahmud Hussain</div>

<img src="https://i.imgur.com/yourphoto.jpg" alt="Mahmud Photo">

<!-- Stars -->
<script>
for(let i=0;i<50;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
}

/* Lantern animation */
setInterval(()=>{
    let l=document.createElement("div");
    l.className="lantern";
    l.innerHTML="🏮";
    l.style.left=Math.random()*100+"vw";
    document.body.appendChild(l);

    setTimeout(()=>{l.remove()},6000);
},800);
</script>

</body>
</html>
